<svg xmlns="http://www.w3.org/2000/svg" width="280" height="100" viewBox="0 0 280 100">
  <rect width="280" height="100" fill="#1c1c1e"/>

  <text x="140" y="18" text-anchor="middle" font-family="-apple-system, SF Pro, Helvetica" font-size="11" font-weight="600" fill="#34C759" letter-spacing="0.5">AFTER</text>

  <!-- Shuffle (active) - accent color with filled circle background -->
  <g transform="translate(80, 36)">
    <circle cx="20" cy="20" r="20" fill="#007AFF" opacity="0.15"/>
    <text x="20" y="26" text-anchor="middle" font-family="-apple-system, SF Pro" font-size="17" fill="#007AFF">&#x21C4;</text>
    <text x="20" y="50" text-anchor="middle" font-family="-apple-system" font-size="9" fill="#34C759">ON</text>
  </g>

  <!-- Repeat (off) - .secondary, no background -->
  <g transform="translate(160, 36)">
    <text x="20" y="26" text-anchor="middle" font-family="-apple-system, SF Pro" font-size="17" fill="#636366">&#x21BB;</text>
    <text x="20" y="50" text-anchor="middle" font-family="-apple-system" font-size="9" fill="#8e8e93">OFF</text>
  </g>

  <!-- Annotation -->
  <text x="140" y="95" text-anchor="middle" font-family="-apple-system" font-size="9" font-weight="600" fill="#34C759">Accent circle background makes active state obvious</text>
</svg>