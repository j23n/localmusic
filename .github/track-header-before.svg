<svg xmlns="http://www.w3.org/2000/svg" width="360" height="160" viewBox="0 0 360 160">
  <rect width="360" height="160" fill="#ffffff"/>

  <text x="180" y="18" text-anchor="middle" font-family="-apple-system, SF Pro, Helvetica" font-size="11" font-weight="600" fill="#8e8e93" letter-spacing="0.5">BEFORE</text>

  <!-- Track count header - .secondary color, hard to read -->
  <text x="20" y="48" font-family="-apple-system, SF Pro, Helvetica" font-size="12" font-weight="500" fill="#8e8e93" letter-spacing="0.5">24 TRACKS</text>

  <!-- Song rows behind it -->
  <g font-family="-apple-system, SF Pro, Helvetica" opacity="0.85">
    <rect x="20" y="58" width="44" height="44" rx="8" fill="#d1d1d6"/>
    <text x="74" y="76" font-size="15" font-weight="500" fill="#1c1c1e">Morning Light</text>
    <text x="74" y="92" font-size="12" fill="#8e8e93">Indie Folk Band</text>
    <text x="330" y="84" font-size="12" fill="#c7c7cc">4:12</text>

    <rect x="20" y="108" width="44" height="44" rx="8" fill="#d1d1d6"/>
    <text x="74" y="126" font-size="15" font-weight="500" fill="#1c1c1e">Coastal Drive</text>
    <text x="74" y="142" font-size="12" fill="#8e8e93">Synthwave Artist</text>
    <text x="330" y="134" font-size="12" fill="#c7c7cc">3:28</text>
  </g>

  <!-- Annotation -->
  <rect x="14" y="34" width="110" height="20" rx="4" fill="none" stroke="#FF3B30" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="69" y="31" text-anchor="middle" font-family="-apple-system" font-size="9" font-weight="600" fill="#FF3B30">Hard to read (.secondary)</text>
</svg>