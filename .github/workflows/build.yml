name: Build IPA

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen

      - name: Build
        run: |
          xcodebuild archive \
            -project LocalMusic.xcodeproj \
            -scheme LocalMusic \
            -destination "generic/platform=iOS" \
            -archivePath build/LocalMusic.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p build/Payload
          cp -r build/LocalMusic.xcarchive/Products/Applications/LocalMusic.app build/Payload/
          cd build && zip -r LocalMusic.ipa Payload

      - name: Upload IPA to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/LocalMusic.ipa
