<svg xmlns="http://www.w3.org/2000/svg" width="360" height="200" viewBox="0 0 360 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f2f7"/>
      <stop offset="100%" stop-color="#e5e5ea"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <text x="180" y="20" text-anchor="middle" font-family="-apple-system, SF Pro, Helvetica" font-size="11" font-weight="600" fill="#34C759" letter-spacing="0.5">AFTER</text>

  <!-- Song list items -->
  <rect x="0" y="30" width="360" height="170" fill="url(#bg)"/>
  <g font-family="-apple-system, SF Pro, Helvetica">
    <rect x="20" y="40" width="44" height="44" rx="8" fill="#d1d1d6"/>
    <text x="74" y="58" font-size="15" font-weight="500" fill="#1c1c1e">Last Song in Library</text>
    <text x="74" y="74" font-size="12" fill="#8e8e93">Artist Name</text>
    <text x="326" y="66" font-size="12" fill="#c7c7cc">3:42</text>
  </g>

  <!-- Mini player - .bar material (matches tab bar, stronger frosted glass) -->
  <g filter="url(#shadow)">
    <rect x="12" y="100" width="336" height="68" rx="14" fill="#f2f2f7" opacity="0.94"/>
    <rect x="12" y="100" width="336" height="68" rx="14" fill="white" opacity="0.6"/>
  </g>
  <!-- Progress bar -->
  <rect x="16" y="100" width="120" height="2" rx="1" fill="#007AFF"/>
  <!-- Artwork -->
  <rect x="32" y="112" width="48" height="48" rx="10" fill="#c7c7cc"/>
  <text x="56" y="141" text-anchor="middle" font-family="-apple-system" font-size="18" fill="#8e8e93">&#9835;</text>
  <!-- Track info -->
  <text x="92" y="132" font-family="-apple-system, SF Pro, Helvetica" font-size="14" font-weight="500" fill="#1c1c1e">Track Title</text>
  <text x="92" y="148" font-family="-apple-system, SF Pro, Helvetica" font-size="12" fill="#8e8e93">Artist</text>
  <!-- Controls -->
  <text x="270" y="138" font-family="-apple-system" font-size="14" fill="#007AFF">&#9664;</text>
  <text x="300" y="140" font-family="-apple-system" font-size="20" fill="#007AFF">&#9654;</text>
  <text x="330" y="138" font-family="-apple-system" font-size="14" fill="#007AFF">&#9654;</text>

  <!-- Tab bar -->
  <rect x="0" y="172" width="360" height="28" fill="#f2f2f7" opacity="0.94"/>
  <rect x="0" y="172" width="360" height="28" fill="white" opacity="0.6"/>
  <line x1="0" y1="172" x2="360" y2="172" stroke="#c6c6c8" stroke-width="0.5"/>
  <text x="60" y="190" text-anchor="middle" font-family="-apple-system" font-size="10" fill="#007AFF">Library</text>
  <text x="180" y="190" text-anchor="middle" font-family="-apple-system" font-size="10" fill="#8e8e93">Now Playing</text>
  <text x="300" y="190" text-anchor="middle" font-family="-apple-system" font-size="10" fill="#8e8e93">Playlists</text>

  <!-- Annotation: matching style -->
  <rect x="8" y="94" width="344" height="80" rx="16" fill="none" stroke="#34C759" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="180" y="90" text-anchor="middle" font-family="-apple-system" font-size="10" font-weight="600" fill="#34C759">.bar material matches tab bar glass</text>
</svg>