<svg xmlns="http://www.w3.org/2000/svg" width="360" height="170" viewBox="0 0 360 170">
  <rect width="360" height="170" fill="#ffffff"/>

  <text x="180" y="18" text-anchor="middle" font-family="-apple-system, SF Pro, Helvetica" font-size="11" font-weight="600" fill="#34C759" letter-spacing="0.5">AFTER</text>

  <!-- Track count header - .primary color (deep black), with top padding -->
  <text x="20" y="56" font-family="-apple-system, SF Pro, Helvetica" font-size="12" font-weight="500" fill="#1c1c1e" letter-spacing="0.5">24 TRACKS</text>

  <!-- Song rows behind it - more breathing room -->
  <g font-family="-apple-system, SF Pro, Helvetica">
    <rect x="20" y="68" width="44" height="44" rx="8" fill="#d1d1d6"/>
    <text x="74" y="86" font-size="15" font-weight="500" fill="#1c1c1e">Morning Light</text>
    <text x="74" y="102" font-size="12" fill="#8e8e93">Indie Folk Band</text>
    <text x="330" y="94" font-size="12" fill="#c7c7cc">4:12</text>

    <rect x="20" y="118" width="44" height="44" rx="8" fill="#d1d1d6"/>
    <text x="74" y="136" font-size="15" font-weight="500" fill="#1c1c1e">Coastal Drive</text>
    <text x="74" y="152" font-size="12" fill="#8e8e93">Synthwave Artist</text>
    <text x="330" y="144" font-size="12" fill="#c7c7cc">3:28</text>
  </g>

  <!-- Annotation -->
  <rect x="14" y="42" width="110" height="20" rx="4" fill="none" stroke="#34C759" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="69" y="39" text-anchor="middle" font-family="-apple-system" font-size="9" font-weight="600" fill="#34C759">Deep black (.primary) + padding</text>
</svg>